apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  namespace: movie-app-ns
spec:
  replicas: 3

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx-container
          image: nginx:1.25
          ports:
            - containerPort: 80