apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: 660119432667.dkr.ecr.us-east-1.amazonaws.com/netflix_frontend:latest
          ports:
            - containerPort: 3000