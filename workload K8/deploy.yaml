apiVersion: apps/v1
kind: deployment
metadata:
  name: my-deployment
spec:
  replicas: 3

  selector:
    matchlabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx-containers
          image: nginx:1.25
          ports:
            - containers: 80