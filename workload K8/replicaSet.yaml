apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-ReplicaSet
spec:
  replicas: 3

  selector:
    matchlabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx-containers
          image: nginx:latest
          ports:
            containers: 80